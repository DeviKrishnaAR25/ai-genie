steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/ai-bi-genie",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "gcr.io/$PROJECT_ID/ai-bi-genie",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "ai-bi-genie",
        "--image",
        "gcr.io/$PROJECT_ID/ai-bi-genie",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--memory",
        "1Gi",
        "--cpu",
        "1",
        "--timeout",
        "300",
        "--max-instances",
        "3",
        "--set-env-vars",
        "PROJECT_ID=$PROJECT_ID",
      ]

images:
  - "gcr.io/$PROJECT_ID/ai-bi-genie"

timeout: "1200s"
